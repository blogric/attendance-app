<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

<h2>Adnan | OLIVE TS</h2>

<div class="card">
    <p>Today: {{today}}</p>
    <p>Status: {{status}}</p>
</div>

<div class="card">
    <p>Total Present: {{present}}</p>
    <p>RL Balance: {{rl}}</p>
</div>

<div class="card">
    <h3>Mark Attendance (Any Date)</h3>
    <form method="POST" action="/mark">
        <input type="date" name="date" value="{{today}}">
        <select name="status">
            <option>Present</option>
            <option>Absent</option>
            <option>RL</option>
            <option>CL</option>
            <option>SL</option>
            <option>AL</option>
        </select>
        <button type="submit">Save</button>
    </form>
</div>

<a href="/calendar">📅 Open Calendar</a>

</div>

<script src="/static/app.js"></script>

</body>
</html>
