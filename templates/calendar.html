<!DOCTYPE html>
<html>
<head>
    <title>Calendar</title>
</head>
<body>

<h2>Attendance Calendar</h2>

<table border="1">

</tr>

</tr>
{% endfor %}

</table>

<a href="/">Back</a>

</body>
</html>
